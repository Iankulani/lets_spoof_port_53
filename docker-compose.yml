# docker-compose.yml
version: '3.8'

services:
  lets-spoof-port-53:
    build: .
    container_name: spoof53
    hostname: spoof53
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    volumes:
      - ./config:/app/.lets-spoof-port-53
      - ./reports:/app/reports
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=UTC
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: PostgreSQL for better data persistence
  postgres:
    image: postgres:13
    container_name: spoof53-db
    environment:
      POSTGRES_DB: spoof53
      POSTGRES_USER: spoof53
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Optional: Redis for caching and message queue
  redis:
    image: redis:7-alpine
    container_name: spoof53-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Optional: Grafana for monitoring
  grafana:
    image: grafana/grafana:latest
    container_name: spoof53-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  grafana_data: